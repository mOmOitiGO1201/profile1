<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>はな の自己紹介</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to bottom, #ffe4ec, #fff);
      margin: 0;
      padding: 0;
      text-align: center;
    }

    header {
      background-color: #ffb6c1;
      padding: 30px 0;
      color: white;
      font-size: 2em;
      letter-spacing: 2px;
    }

    .container {
      padding: 40px;
    }

    .flower {
      font-size: 80px;
      margin: 20px 0;
      animation: sway 3s infinite ease-in-out;
    }

    @keyframes sway {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(5deg); }
      100% { transform: rotate(0deg); }
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      color: #ff69b4;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>

<header>
  はな のページ 🌸
</header>

<div class="container">
  <div class="flower">🌷</div>

  <div class="card">
    <h2>自己紹介</h2>
    <p>こんにちは、はなです！</p>
    <p>花のように明るく、やさしい人になりたいです。</p>
  </div>

  <div class="card">
    <h2>好きなこと</h2>
    <p>・音楽を聴くこと 🎧</p>
    <p>・おいしいものを食べること 🍰</p>
    <p>・ゆっくり過ごす時間 🌿</p>
  </div>

  <div class="card">
    <h2>ひとこと</h2>
    <p>これからもいろんなことに挑戦していきたいです！</p>
  </div>
</div>

<footer>
  © hana
</footer>

</body>
</html>
